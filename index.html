<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>おうちの電気代スコープ</title>
<link rel="manifest" href="manifest.json">
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --primary: #00d1b2;
            --accent: #ffdd57;
            --text: #ffffff;
            --text-dim: #b5b5b5;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .app-container { max-width: 450px; margin: auto; }
        .header { padding: 20px 0; text-align: center; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .price-display { font-size: 3rem; font-weight: 800; color: var(--primary); text-align: center; margin: 10px 0; }
        .price-unit { font-size: 1rem; color: var(--text-dim); }
        
        button { width: 100%; background: var(--primary); color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 1rem; cursor: pointer; margin-bottom: 10px; }
        select, input { width: 100%; padding: 12px; background: #333; border: 1px solid #444; border-radius: 8px; color: white; margin-bottom: 15px; box-sizing: border-box; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .stat-box { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; text-align: center; }
        .stat-label { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 5px; }
        .stat-value { font-weight: bold; color: var(--accent); }
    </style>

</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>⚡️ Energy Scope</h1>
        <p style="color:var(--text-dim)">現在地の電気を「見える化」</p>
    </div>

    <div class="card">
        <button onclick="getLocation()">📍 現在地の単価を特定</button>
        <div id="status" style="font-size: 0.8rem; text-align: center; color: var(--accent);"></div>
        <div class="price-display" id="unitPrice">--<span class="price-unit">円/kWh</span></div>
        <div style="text-align: center; font-size: 0.8rem; color: var(--text-dim);">燃料調整費・再エネ賦課金(3.45円)込の目安</div>
    </div>

    <div class="card">
        <h3>💡 家電別シミュレーター</h3>
        <label>使用する家電のワット数(W)</label>
        <input type="number" id="customW" value="1000" oninput="updateCustom()">
        <div class="grid">
            <div class="stat-box">
                <div class="stat-label">1時間あたり</div>
                <div class="stat-value" id="costHour">-- 円</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">24時間あたり</div>
                <div class="stat-value" id="costDay">-- 円</div>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>🏠 世帯別・月額目安</h3>
        <select id="familySize" onchange="updateCustom()">
            <option value="250">1人暮らし (250kWh)</option>
            <option value="370" selected>2人世帯 (370kWh)</option>
            <option value="450">4人家族 (450kWh)</option>
        </select>
        <div style="text-align: center; font-size: 1.5rem; font-weight: bold; color: var(--primary);" id="monthlyTotal">
            約 -- 円 / 月
        </div>
    </div>
</div>

<script>
let rate = 31; // 初期値
const areaRates = { "北海道":36.5, "東北":32.8, "東京":34.2, "中部":30.5, "北陸":26.3, "関西":28.1, "中国":31.8, "四国":31.4, "九州":25.8, "沖縄":38.6 };

async function getLocation() {
    const status = document.getElementById('status');
    status.innerText = "GPSスキャン中...";
    
    if (!navigator.geolocation) {
        status.innerText = "GPS未対応のブラウザです";
        return;
    }

    navigator.geolocation.getCurrentPosition(async (pos) => {
        try {
            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`);
            const data = await res.json();
            const pref = data.address.province || data.address.state || "東京";
            
            // 深夜割引の簡易ロジック（23時〜7時は10%引きとするシミュレーション）
            const hour = new Date().getHours();
            let timeDiscount = (hour >= 23 || hour < 7) ? 0.9 : 1.0;

            for (let key in areaRates) {
                if (pref.includes(key)) {
                    rate = (areaRates[key] + 3.45) * timeDiscount;
                    break;
                }
            }

            document.getElementById('unitPrice').innerHTML = `${rate.toFixed(1)}<span class="price-unit">円/kWh</span>`;
            status.innerText = `エリア判定成功: ${pref} ${timeDiscount < 1 ? ' (深夜割引適用中)' : ''}`;
            updateCustom();
        } catch (e) {
            status.innerText = "通信エラーが発生しました";
        }
    }, () => {
        status.innerText = "位置情報の許可が必要です";
    });
}

function updateCustom() {
    const w = document.getElementById('customW').value;
    const hourCost = (w / 1000) * rate;
    const dayCost = hourCost * 24;
    
    document.getElementById('costHour').innerText = `${hourCost.toFixed(1)} 円`;
    document.getElementById('costDay').innerText = `${Math.round(dayCost)} 円`;

    const kwh = document.getElementById('familySize').value;
    const monthly = Math.round(kwh * rate);
    document.getElementById('monthlyTotal').innerText = `約 ${monthly.toLocaleString()} 円 / 月`;
}
</script>

</body>
</html>
